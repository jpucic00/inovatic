sonar.projectKey=inovatic
sonar.projectName=Inovatic
sonar.projectVersion=0.1.0

# Sources
sonar.sources=src
sonar.tests=tests
sonar.test.inclusions=tests/**/*.spec.ts

# Exclusions (generated, seed data, migration scripts, false positives)
sonar.exclusions=\
  **/node_modules/**,\
  **/.next/**,\
  **/prisma/seed.ts,\
  **/playwright-report/**,\
  **/test-results/**,\
  **/src/app/globals.css,\
  **/src/components/ui/form.tsx

# TypeScript
sonar.javascript.file.suffixes=.js,.jsx
sonar.typescript.file.suffixes=.ts,.tsx

# Host — SonarQube running locally in Docker
sonar.host.url=http://localhost:9000

# Token — set via SONAR_TOKEN env var when running the scanner
# e.g.: SONAR_TOKEN=your_token npm run sonar:scan
